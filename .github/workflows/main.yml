name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix build.gradle.kts
        run: |
          cat > android/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          
          android {
              namespace = "com.example.bt_terminal"
              compileSdk = flutter.compileSdkVersion
              ndkVersion = flutter.ndkVersion
          
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          
              kotlinOptions {
                  jvmTarget = "17"
              }
          
              defaultConfig {
                  applicationId = "com.example.bt_terminal"
                  minSdk = 23
                  targetSdk = flutter.targetSdkVersion
                  versionCode = 1
                  versionName = "1.0.0"
              }
          
              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          
          flutter {
              source = "../.."
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
          }
          EOF
          
          cat android/app/build.gradle.kts  # вывести для проверки

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build split APKs (release)
        run: flutter build apk --split-per-abi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-split
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk